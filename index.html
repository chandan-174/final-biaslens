<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BIASLENS</title>
    <meta name="description" content="The first platform combining business analytics with cognitive bias detection. Upload data, see charts, and get AI-powered bias alerts on your business decisions." />
    <meta name="author" content="AI Data &amp; Decision Intelligence System" />
    <meta property="og:title" content="AI Data &amp; Decision Intelligence System" />
    <script>
      (function () {
        try {
          var key = "ai-dashboard-theme";
          var stored = localStorage.getItem(key);
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          var shouldDark = stored ? stored === "dark" : prefersDark;
          if (shouldDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <meta property="og:description" content="Upload data, see charts, and get AI-powered bias alerts on your business decisions." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
